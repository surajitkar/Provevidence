# Agent Prompt Autoresearch — Experiment Configuration
# -------------------------------------------------------
# This is the only file you need to edit to run an experiment.
# Everything else runs automatically.

name: review-churn-reduction-v1

# Single-file instructions: variant sections live in program_file (see program.md).
# If a section is missing, instruction_pack on the variant is used as fallback.
instruction_source:
  use_program: true
  program_file: .repo-autoresearch/program.md

cohort:
  # Which branches to watch for AI-generated PRs
  target_branches:
    - main
    - master

# Optional: which GitHub Check Runs to store in Gist state under each pr_run.ci_checks.
# If include_name_substrings is empty or omitted, every check run returned for the
# commit is recorded (same jobs you see on the PR Checks tab).
ci_tracking:
  include_name_substrings: []

# Optional: simple PR-body compliance hints for the evidence block (heuristics, not a legal guarantee).
compliance:
  pr_body_min_length: 50
  checklist:
    - id: tracking_tag
      hint: "PR body should include the autoresearch tag from get_variant.py"
    - id: describes_verification
      hint: "Description should mention how to verify (tests, steps, or pytest)"

# The metric you are optimising.
# Options: review_round_trips | first_pass_ci_success | time_to_merge
primary_metric: review_round_trips

# Guardrails — the challenger must NOT violate these to be promoted.
guardrails:
  - first_pass_ci_success >= baseline - 0.03   # CI pass rate must not drop >3%
  - revert_rate_7d <= baseline + 0.01           # Revert rate must not rise >1%

# How many PRs per variant to collect before evaluating.
# Raise to 20+ in production. Keep at 5 for initial testing.
evaluation_window:
  type: pr_count
  value: 20

# Challenger must beat baseline by this % to be promoted.
promotion_threshold_pct: 15

# Optional: when true, an evaluation that recommends promotion opens a PR that copies the
# winning variant section over the baseline in program_file (see PROMOTION.md).
promotion:
  auto_open_pr: false

# Variants — first entry is always the baseline (control group).
# instruction_pack is optional fallback when program.md has no matching section.
variants:
  - id: baseline
    instruction_pack: .repo-autoresearch/variants/baseline.md
    evidence_template: .repo-autoresearch/evidence-templates/standard.md

  - id: compact_diff_v1
    instruction_pack: .repo-autoresearch/variants/compact-diff.md
    evidence_template: .repo-autoresearch/evidence-templates/standard.md

  # Example: add a third variant when compact_diff_v1 becomes the new baseline
  # - id: compact_diff_v2
  #   instruction_pack: .repo-autoresearch/variants/compact-diff-v2.md
  #   evidence_template: .repo-autoresearch/evidence-templates/standard.md
