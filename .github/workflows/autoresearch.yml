name: Agent Prompt Autoresearch

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  autoresearch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run Autoresearch
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          REPO_FULL_NAME:    ${{ github.repository }}
          GIST_ID:           ${{ secrets.GIST_ID }}
          GIST_TOKEN:        ${{ secrets.GIST_TOKEN }}

          # PR context
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          PR_ACTION:         ${{ github.event.action }}
          PR_AUTHOR:         ${{ github.event.pull_request.user.login }}
          PR_TITLE:          ${{ github.event.pull_request.title }}
          PR_BASE_BRANCH:    ${{ github.event.pull_request.base.ref }}
          PR_MERGED:         ${{ github.event.pull_request.merged }}
          PR_BODY:           ${{ github.event.pull_request.body }}

          # Review context
          REVIEW_STATE:      ${{ github.event.review.state }}

          # CI context — fires when check_suite completes
          CHECK_SHA:         ${{ github.event.check_suite.head_sha }}
          CHECK_CONCLUSION:  ${{ github.event.check_suite.conclusion }}
          CHECK_PR_NUMBERS:  ${{ toJSON(github.event.check_suite.pull_requests) }}

        run: python scripts/autoresearch.py